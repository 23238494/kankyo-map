name: Supabaseデータ同期
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Supabaseからデータ取得
        env:
          KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: curl -sf -H "apikey: $KEY" -H "Authorization: Bearer $KEY" "https://fstcofvakssanygeyqcpt.supabase.co/rest/v1/analysis_results?select=*&order=created_at.desc&limit=5000" -o social_data.json

      - name: 変更があればコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add social_data.json
          git diff --cached --quiet || git commit -m "sync: update social_data.json"
          git push
