<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>環境評価ソーシャルマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; }
    #map { width: 100vw; height: 100vh; }

    /* ヘッダー */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(255,255,255,0.95);
      padding: 6px 12px 3px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    /* モード切替（横スクロール対応） */
    #mode-bar {
      display: flex; gap: 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 1px;
    }
    #mode-bar::-webkit-scrollbar { display: none; }
    .mode-btn {
      padding: 4px 10px; border-radius: 16px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.18s;
      background: #eee; color: #666;
    }
    .mode-btn.active { color: #fff; }
    .mode-btn[data-mode="combined"].active { background: #7B1FA2; }
    .mode-btn[data-mode="green"].active    { background: #388E3C; }
    .mode-btn[data-mode="sky"].active      { background: #1976D2; }
    .mode-btn[data-mode="svf"].active      { background: #1A237E; }
    .mode-sep { width: 1px; height: 18px; background: #ddd; align-self: center; margin: 0 1px; }

    #count {
      font-size: 11px; color: #888;
      margin-top: 3px;
      white-space: nowrap;
    }
    #count.error {
      color: #c62828; font-size: 10px;
    }

    /* 凡例 */
    #legend {
      position: fixed; bottom: 24px; left: 12px; z-index: 1000;
      background: rgba(255,255,255,0.95);
      border-radius: 10px; padding: 8px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      min-width: 140px;
    }
    #legend-title { font-size: 11px; font-weight: bold; margin-bottom: 5px; }
    #legend-bar {
      width: 130px; height: 14px; border-radius: 4px;
    }
    #legend-labels {
      display: flex; justify-content: space-between;
      font-size: 9px; color: #666; margin-top: 2px; width: 130px;
    }

    /* ホームボタン */
    #home-btn {
      position: fixed; bottom: 24px; right: 12px; z-index: 1000;
      width: 40px; height: 40px; border-radius: 50%;
      background: #fff; border: 2px solid #7B1FA2; color: #7B1FA2;
      font-size: 20px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      transition: background 0.15s, color 0.15s;
    }
    #home-btn:hover { background: #7B1FA2; color: #fff; }

    /* Leaflet ズームコントロールをヘッダーの下に移動 */
    .leaflet-top { margin-top: 62px; }

    /* ポップアップ */
    .popup-inner { font-size: 13px; line-height: 1.7; min-width: 140px; }
    .popup-inner .rate { font-size: 18px; font-weight: bold; }
    .popup-inner .addr { font-size: 11px; color: #888; margin-top: 4px; }
    .popup-inner .dt   { font-size: 10px; color: #aaa; }
  </style>
</head>
<body>

<div id="header">
  <div id="mode-bar">
    <button class="mode-btn active" data-mode="combined">総合</button>
    <button class="mode-btn"        data-mode="green">緑視度</button>
    <button class="mode-btn"        data-mode="sky">開放度</button>
    <span class="mode-sep"></span>
    <button class="mode-btn"        data-mode="svf">天空率</button>
  </div>
  <span id="count">データを取得中…</span>
</div>

<div id="map"></div>

<button id="home-btn" title="初期位置に戻る">⌂</button>

<div id="legend">
  <div id="legend-title">総合（緑視度＋開放度）</div>
  <canvas id="legend-bar" width="130" height="14"></canvas>
  <div id="legend-labels"></div>
</div>

<script>
// グラデーション定義
const GRADIENTS = {
  combined: { min: [206,147,216], max: [106,27,154], maxRate: 1.0,
               title: '総合（緑視度＋開放度）', labels: ['0%','25%','50%','75%','≥100%'] },
  green:    { min: [102,187,106], max: [27,94,32],   maxRate: 0.4,
               title: '緑視度', labels: ['0%','10%','20%','30%','≥40%'] },
  sky:      { min: [66,165,245],  max: [13,71,161],  maxRate: 0.5,
               title: '開放度', labels: ['0%','10%','20%','30%','40%','≥50%'] },
  svf:      { min: [159,168,218], max: [26,35,126],  maxRate: 1.0,
               title: '天空率（SVF）', labels: ['0%','25%','50%','75%','100%'] },
};

let currentMode = 'combined';
let allData = [];
let markers = [];

// 地図初期化
const map = L.map('map').setView([33.25, 130.30], 11);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a>',
  maxZoom: 18,
}).addTo(map);

// 色補間
function lerpColor(min, max, t) {
  t = Math.max(0, Math.min(1, t));
  return [
    Math.round(min[0] + (max[0]-min[0])*t),
    Math.round(min[1] + (max[1]-min[1])*t),
    Math.round(min[2] + (max[2]-min[2])*t),
  ];
}
function toHex([r,g,b]) {
  return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function getColor(row, mode) {
  const g = GRADIENTS[mode];
  let rate;
  if (mode === 'combined') rate = Math.min(row.green_rate + row.sky_rate, 1.0);
  else if (mode === 'green') rate = row.green_rate;
  else if (mode === 'sky') rate = row.sky_rate;
  else rate = row.svf || 0;
  return toHex(lerpColor(g.min, g.max, rate / g.maxRate));
}

// ピンのHTML（円＋下向き三角のポインター）
function pinHtml(color, innerHtml) {
  return `<div style="display:flex;flex-direction:column;align-items:center;">
    <div style="width:30px;height:30px;background:${color};border:2.5px solid white;border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;">
      ${innerHtml}
    </div>
    <div style="width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:9px solid ${color};margin-top:-2px;"></div>
  </div>`;
}

// ポップアップHTML（緑視度・開放度系）
function standardPopupHtml(row, hasBearing) {
  const gPct = (row.green_rate * 100).toFixed(1);
  const sPct = (row.sky_rate   * 100).toFixed(1);
  const cPct = Math.min((row.green_rate + row.sky_rate)*100, 100).toFixed(1);
  const dt   = row.created_at ? new Date(row.created_at).toLocaleDateString('ja-JP') : '';
  return `
    <div class="popup-inner">
      <div><span style="color:#388E3C">🌿 緑視度</span> <span class="rate" style="color:#388E3C">${gPct}%</span></div>
      <div><span style="color:#1976D2">☁️ 開放度</span> <span class="rate" style="color:#1976D2">${sPct}%</span></div>
      <div><span style="color:#7B1FA2">📊 総合</span> <span class="rate" style="color:#7B1FA2">${cPct}%</span></div>
      ${row.address ? `<div class="addr">📍 ${row.address}</div>` : ''}
      ${hasBearing ? `<div class="dt">方位 ${Math.round(row.bearing)}°</div>` : ''}
      ${dt ? `<div class="dt">${dt}</div>` : ''}
    </div>
  `;
}

// ポップアップHTML（天空率）
function svfPopupHtml(row) {
  const svfPct = ((row.svf || 0) * 100).toFixed(1);
  const dt = row.created_at ? new Date(row.created_at).toLocaleDateString('ja-JP') : '';
  return `
    <div class="popup-inner">
      <div><span style="color:#1A237E">◎ 天空率</span> <span class="rate" style="color:#1A237E">${svfPct}%</span></div>
      ${row.address ? `<div class="addr">📍 ${row.address}</div>` : ''}
      ${dt ? `<div class="dt">${dt}</div>` : ''}
    </div>
  `;
}

// マーカー描画
function renderMarkers() {
  markers.forEach(m => m.remove());
  markers = [];

  const showSvf = currentMode === 'svf';
  const rows = allData.filter(row => showSvf ? row.type === 'svf' : row.type !== 'svf');

  rows.forEach(row => {
    const color = getColor(row, currentMode);
    const hasBearing = row.bearing !== null && row.bearing !== undefined;
    const isSvf = row.type === 'svf';

    let inner;
    if (hasBearing) {
      inner = `<span style="display:block;transform:rotate(${row.bearing}deg);font-size:15px;color:white;line-height:1;">▲</span>`;
    } else if (isSvf) {
      inner = `<span style="font-size:14px;color:white;line-height:1;">◎</span>`;
    } else {
      inner = `<span style="font-size:14px;color:white;line-height:1;">●</span>`;
    }

    const marker = L.marker([row.latitude, row.longitude], {
      icon: L.divIcon({
        html: pinHtml(color, inner),
        iconSize: [30, 38],
        iconAnchor: [15, 38],
        className: ''
      })
    });

    marker.bindPopup(isSvf ? svfPopupHtml(row) : standardPopupHtml(row, hasBearing));
    marker.addTo(map);
    markers.push(marker);
  });
}

// 凡例更新
function updateLegend() {
  const g = GRADIENTS[currentMode];
  document.getElementById('legend-title').textContent = g.title;

  const canvas = document.getElementById('legend-bar');
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,130,0);
  grad.addColorStop(0, toHex(g.min));
  grad.addColorStop(1, toHex(g.max));
  ctx.clearRect(0,0,130,14);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0,0,130,14,4);
  ctx.fill();

  const labelsEl = document.getElementById('legend-labels');
  labelsEl.innerHTML = g.labels.map(l=>`<span>${l}</span>`).join('');
}

// モード切替
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    renderMarkers();
    updateLegend();
  });
});

// GitHub Pages の JSON からデータを取得する
fetch('social_data.json')
  .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
  .then(data => {
    allData = data;
    document.getElementById('count').textContent = `${allData.length} 件`;
    if (allData.length > 0) {
      map.setView([allData[0].latitude, allData[0].longitude], 13);
    }
    renderMarkers();
  })
  .catch(e => {
    const el = document.getElementById('count');
    el.className = 'error';
    el.textContent = `データ取得失敗: ${e.message}`;
  });

updateLegend();

document.getElementById('home-btn').addEventListener('click', () => {
  map.setView([33.25, 130.30], 11);
});
</script>
</body>
</html>
