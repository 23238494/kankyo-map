<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>環境評価ソーシャルマップ</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; }
    #map { width: 100vw; height: 100vh; }

    /* ヘッダー */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(255,255,255,0.95);
      padding: 8px 16px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    #header h1 { font-size: 15px; font-weight: bold; color: #333; white-space: nowrap; }

    /* モード切替 */
    #mode-bar {
      display: flex; gap: 4px;
    }
    .mode-btn {
      padding: 4px 12px; border-radius: 16px; border: none;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all 0.18s;
      background: #eee; color: #666;
    }
    .mode-btn.active { color: #fff; }
    .mode-btn[data-mode="combined"].active { background: #7B1FA2; }
    .mode-btn[data-mode="green"].active    { background: #388E3C; }
    .mode-btn[data-mode="sky"].active      { background: #1976D2; }

    #count { font-size: 11px; color: #888; margin-left: auto; white-space: nowrap; }

    /* 凡例 */
    #legend {
      position: fixed; bottom: 24px; left: 12px; z-index: 1000;
      background: rgba(255,255,255,0.95);
      border-radius: 10px; padding: 8px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      min-width: 140px;
    }
    #legend-title { font-size: 11px; font-weight: bold; margin-bottom: 5px; }
    #legend-bar {
      width: 130px; height: 14px; border-radius: 4px;
    }
    #legend-labels {
      display: flex; justify-content: space-between;
      font-size: 9px; color: #666; margin-top: 2px; width: 130px;
    }

    /* ポップアップ */
    .popup-inner { font-size: 13px; line-height: 1.7; min-width: 140px; }
    .popup-inner .rate { font-size: 18px; font-weight: bold; }
    .popup-inner .addr { font-size: 11px; color: #888; margin-top: 4px; }
    .popup-inner .dt   { font-size: 10px; color: #aaa; }
  </style>
</head>
<body>

<div id="header">
  <h1>🌿 ソーシャルマップ</h1>
  <div id="mode-bar">
    <button class="mode-btn active" data-mode="combined">総合</button>
    <button class="mode-btn"        data-mode="green">緑視率</button>
    <button class="mode-btn"        data-mode="sky">天空率</button>
  </div>
  <span id="count">読み込み中…</span>
</div>

<div id="map"></div>

<div id="legend">
  <div id="legend-title">総合（緑視率＋天空率）</div>
  <canvas id="legend-bar" width="130" height="14"></canvas>
  <div id="legend-labels"></div>
</div>

<script>
const SUPABASE_URL      = 'https://fstcofvakssanygeyqcpt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzdGNvZnZha3NzanlnZXlxY3B0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMzU2ODksImV4cCI6MjA5NjgxMTY4OX0.S9Zq9o2yIzGPVnI5Dk8PQLtBg3k8InFUNx5srHzYqBs';

// グラデーション定義
const GRADIENTS = {
  combined: { min: [206,147,216], max: [106,27,154], maxRate: 1.0,
               title: '総合（緑視率＋天空率）', labels: ['0%','25%','50%','75%','≥100%'] },
  green:    { min: [102,187,106], max: [27,94,32],   maxRate: 0.4,
               title: '緑視率', labels: ['0%','10%','20%','30%','≥40%'] },
  sky:      { min: [66,165,245],  max: [13,71,161],  maxRate: 0.5,
               title: '天空率', labels: ['0%','10%','20%','30%','40%','≥50%'] },
};

let currentMode = 'combined';
let allData = [];
let markers = [];

// 地図初期化
const map = L.map('map').setView([35.68, 139.69], 6);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/">OpenStreetMap</a>',
  maxZoom: 18,
}).addTo(map);

// 色補間
function lerpColor(min, max, t) {
  t = Math.max(0, Math.min(1, t));
  return [
    Math.round(min[0] + (max[0]-min[0])*t),
    Math.round(min[1] + (max[1]-min[1])*t),
    Math.round(min[2] + (max[2]-min[2])*t),
  ];
}
function toHex([r,g,b]) {
  return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function getColor(row, mode) {
  const g = GRADIENTS[mode];
  let rate;
  if (mode === 'combined') rate = Math.min(row.green_rate + row.sky_rate, 1.0);
  else if (mode === 'green') rate = row.green_rate;
  else rate = row.sky_rate;
  return toHex(lerpColor(g.min, g.max, rate / g.maxRate));
}

// マーカー描画
function renderMarkers() {
  markers.forEach(m => m.remove());
  markers = [];
  allData.forEach(row => {
    const color = getColor(row, currentMode);
    const circle = L.circleMarker([row.lat, row.lng], {
      radius: 9,
      fillColor: color,
      color: '#fff',
      weight: 2,
      fillOpacity: 0.92,
    });

    const gPct  = (row.green_rate * 100).toFixed(1);
    const sPct  = (row.sky_rate   * 100).toFixed(1);
    const cPct  = Math.min((row.green_rate + row.sky_rate)*100, 100).toFixed(1);
    const dt    = row.created_at ? new Date(row.created_at).toLocaleDateString('ja-JP') : '';
    circle.bindPopup(`
      <div class="popup-inner">
        <div><span style="color:#388E3C">🌿 緑視率</span> <span class="rate" style="color:#388E3C">${gPct}%</span></div>
        <div><span style="color:#1976D2">☁️ 天空率</span> <span class="rate" style="color:#1976D2">${sPct}%</span></div>
        <div><span style="color:#7B1FA2">📊 総合</span> <span class="rate" style="color:#7B1FA2">${cPct}%</span></div>
        ${row.address ? `<div class="addr">📍 ${row.address}</div>` : ''}
        ${dt ? `<div class="dt">${dt}</div>` : ''}
      </div>
    `);
    circle.addTo(map);
    markers.push(circle);
  });
}

// 凡例更新
function updateLegend() {
  const g = GRADIENTS[currentMode];
  document.getElementById('legend-title').textContent = g.title;

  const canvas = document.getElementById('legend-bar');
  const ctx = canvas.getContext('2d');
  const grad = ctx.createLinearGradient(0,0,130,0);
  grad.addColorStop(0, toHex(g.min));
  grad.addColorStop(1, toHex(g.max));
  ctx.clearRect(0,0,130,14);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0,0,130,14,4);
  ctx.fill();

  const labelsEl = document.getElementById('legend-labels');
  labelsEl.innerHTML = g.labels.map(l=>`<span>${l}</span>`).join('');
}

// モード切替
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    renderMarkers();
    updateLegend();
  });
});

// データ取得
async function loadData() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/social_results?select=*&order=created_at.desc&limit=5000`,
      { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    allData = await res.json();
    document.getElementById('count').textContent = `${allData.length} 件`;
    if (allData.length > 0) {
      // データがあれば最初の点に移動
      map.setView([allData[0].lat, allData[0].lng], 13);
    }
    renderMarkers();
  } catch(e) {
    document.getElementById('count').textContent = '読み込み失敗';
    console.error(e);
  }
}

updateLegend();
loadData();
</script>
</body>
</html>
